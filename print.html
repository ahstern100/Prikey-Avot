<!DOCTYPE html>

<html dir="rtl" lang="he"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>MishnaMaker - הדפסה A4</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700;800&amp;family=Heebo:wght@400;500;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="print.css">
</head>
<body class="font-body text-slate-900 min-h-screen selection:bg-blue-100">
<!-- TopAppBar -->
<nav class="bg-white border-b border-slate-100 flex justify-between items-center px-8 py-4 w-full no-print sticky top-0 z-40">
<div class="text-2xl font-black text-primary font-headline">
            MishnaMaker
        </div>
<div class="hidden md:flex gap-8 items-center">
<a class="font-bold text-lg text-slate-400 hover:text-primary transition-colors" href="index.html">הגדרות</a>
<a class="font-bold text-lg text-primary border-b-4 border-primary pb-1" href="print.html">תצוגה מקדימה</a>
</div>
<div class="flex items-center gap-4">
<button class="text-primary p-2 hover:bg-blue-50 rounded-full transition-colors" onclick="window.print()" title="הדפסה">
<span class="material-symbols-outlined" data-icon="print">print</span>
</button>
<button class="text-primary p-2 hover:bg-blue-50 rounded-full transition-colors" title="שיתוף">
<span class="material-symbols-outlined" data-icon="share">share</span>
</button>
</div>
</nav>
<!-- Main Content Canvas (A4 Portrait Container) -->
<main class="print-container p-4 sm:p-6 md:p-10 flex flex-col">
<!-- Page Border Wrapper -->
<div class="page-border border-[8px] border-double border-slate-200 rounded-[2rem] p-4 md:p-6 w-full h-full flex flex-col">
<div class="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6 flex-grow h-full">
<!-- Card 1 -->
<div id="card1" class="bg-blue-50/50 rounded-[2rem] p-4 md:p-8 flex flex-col justify-center items-center text-center border-2 border-primary/10 relative overflow-hidden h-full min-h-[150px]">
<p class="text-mishna text-primary font-headline"></p>
</div>
<!-- Card 2 -->
<div id="card2" class="bg-orange-50/50 rounded-[2rem] p-4 md:p-8 flex flex-col justify-center items-center text-center border-2 border-secondary/10 relative overflow-hidden h-full min-h-[150px]">
<p class="text-mishna text-secondary font-headline"></p>
</div>
<!-- Card 3 -->
<div id="card3" class="bg-amber-50/50 rounded-[2rem] p-4 md:p-8 flex flex-col justify-center items-center text-center border-2 border-tertiary/10 relative overflow-hidden h-full min-h-[150px]">
<p class="text-mishna text-tertiary font-headline"></p>
</div>
<!-- Card 4 -->
<div id="card4" class="bg-lime-50/50 rounded-[2rem] p-4 md:p-8 flex flex-col justify-center items-center text-center border-2 border-outline/10 relative overflow-hidden h-full min-h-[150px]">
<p class="text-mishna text-outline font-headline"></p>
</div>
</div>
</div>
</main>
<!-- Floating Action Button for Printing -->
<button class="no-print fixed bottom-12 left-12 bg-primary text-white w-16 h-16 md:w-20 md:h-20 rounded-full shadow-2xl flex items-center justify-center hover:scale-110 active:scale-95 transition-all z-50 group border-4 border-white" onclick="window.print()">
<span class="material-symbols-outlined text-3xl md:text-4xl" data-icon="print">print</span>
<span class="absolute left-24 bg-slate-900 text-white px-4 py-2 rounded-lg text-sm font-bold opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap pointer-events-none">הדפס פוסטר</span>
</button>
<!-- BottomNavBar (Mobile only) -->
<nav class="md:hidden no-print bg-white/90 backdrop-blur-md fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-6 pb-6 pt-2 border-t border-slate-100">
<a href="index.html" class="flex flex-col items-center justify-center text-slate-400">
<span class="material-symbols-outlined" data-icon="edit_square">edit_square</span>
<span class="font-headline font-bold text-[10px]">עיצוב</span>
</a>
<a href="print.html" class="flex flex-col items-center justify-center text-primary">
<span class="material-symbols-outlined" data-icon="auto_awesome">auto_awesome</span>
<span class="font-headline font-bold text-[10px]">פוסטר</span>
</a>
</nav>
<script src="print.js"></script>
</body></html>
