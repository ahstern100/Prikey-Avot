<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הדפסת משניות</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre&family=Heebo&family=Assistant&family=Suez+One&family=David+Libre&display=swap" rel="stylesheet">
    <style id="dynamic-styles"></style>
</head>
<body>
    <div class="container" id="result-container">
        <h1>משניות להדפסה</h1>
        <!-- Mishnas will be dynamically inserted here -->
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const mishnaData = JSON.parse(localStorage.getItem('mishnaData'));
            const resultContainer = document.getElementById('result-container');
            const dynamicStyles = document.getElementById('dynamic-styles');

            if (mishnaData) {
                // Apply page background color
                document.body.style.backgroundColor = mishnaData.page_bgColor;

                let styles = '';

                for (let i = 1; i <= 4; i++) {
                    const mishnaPrefix = `mishna${i}`;
                    const mishna = mishnaData[mishnaPrefix];

                    if (mishna && mishna.text) {
                        // Create Mishna container
                        const mishnaDiv = document.createElement('div');
                        mishnaDiv.classList.add('mishna-container');
                        mishnaDiv.id = `mishna-result-${i}`;

                        // Create and style the text element
                        const textP = document.createElement('p');
                        textP.textContent = mishna.text;
                        mishnaDiv.appendChild(textP);

                        // Append the Mishna to the container
                        resultContainer.appendChild(mishnaDiv);

                        // Add dynamic styles for the mishna
                        styles += `
                            #mishna-result-${i} {
                                border: 2px solid ${mishna.borderColor};
                                background-color: ${mishna.bgColor};
                                color: ${mishna.textColor};
                                font-family: '${mishna.fontFamily}', sans-serif;
                                font-size: ${mishna.fontSize}px;
                                padding: 20px;
                                margin-bottom: 20px;
                                border-radius: 8px;
                            }
                        `;
                    }
                }
                dynamicStyles.innerHTML = styles;
            } else {
                resultContainer.innerHTML = '<p>לא נמצאו נתונים. אנא חזור לדף הקודם ומלא את הטופס.</p>';
            }
        });
    </script>
</body>
</html>
